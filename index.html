<style>
  :root {

    --accent: #00e5a0;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header {
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .hglow {
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 260px;
    background: radial-gradient(ellipse, rgba(0,229,160,0.10) 0%, transparent 65%);
    pointer-events: none;
  }
  header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; letter-spacing: -2px; line-height: 1; }
  header h1 em { font-style: normal; color: var(--accent); }
  .subtitle { margin-top: 0.6rem; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--muted); }
  .stats {
    display: inline-flex; gap: 0.4rem; margin-top: 1.8rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.4rem 1rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted);
  }
  .stats span { color: var(--accent); font-weight: 600; }

  .controls { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 0; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); width: 15px; height: 15px; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 0.8rem 1rem 0.8rem 2.6rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
  .search-wrap input::placeholder { color: var(--muted); }

  .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 1rem; }
  .filter-btn {
    padding: 0.3rem 0.85rem; border-radius: 999px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .results-info {
    max-width: 780px; margin: 1.2rem auto 0; padding: 0 1.5rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); min-height: 1rem;
  }

  .list { max-width: 780px; margin: 0.8rem auto 4rem; padding: 0 1.5rem; display: flex; flex-direction: column; gap: 0.35rem; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .card:hover { border-color: var(--border-hover); }
  .card.open { border-color: #232840; }

  .card-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; cursor: pointer; user-select: none; }
  .card-num { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); min-width: 32px; flex-shrink: 0; }

  .tag { font-size: 0.58rem; padding: 0.18rem 0.55rem; border-radius: 999px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .tag-crm     { background: rgba(124,106,247,0.14); color: #9b8df5; border: 1px solid rgba(124,106,247,0.25); }
  .tag-ecom    { background: rgba(0,229,160,0.10);   color: #00e5a0; border: 1px solid rgba(0,229,160,0.25); }
  .tag-finance { background: rgba(247,106,106,0.10); color: #f78080; border: 1px solid rgba(247,106,106,0.25); }
  .tag-auth    { background: rgba(251,191,36,0.10);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
  .tag-notif   { background: rgba(56,189,248,0.10);  color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); }
  .tag-ia      { background: rgba(167,139,250,0.10); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
  .tag-log     { background: rgba(52,211,153,0.10);  color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
  .tag-agend   { background: rgba(249,115,22,0.10);  color: #f97316; border: 1px solid rgba(249,115,22,0.25); }
  .tag-api     { background: rgba(236,72,153,0.10);  color: #ec4899; border: 1px solid rgba(236,72,153,0.25); }
  .tag-misc    { background: rgba(148,163,184,0.10); color: #94a3b8; border: 1px solid rgba(148,163,184,0.25); }

  .card-title { font-size: 0.85rem; font-weight: 700; color: #dde4f0; flex: 1; }

  .card-chevron { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .card.open .card-chevron { transform: rotate(180deg); color: var(--accent); }

  .card-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.28s cubic-bezier(0.4,0,0.2,1); }
  .card.open .card-body { grid-template-rows: 1fr; }
  .card-body-inner { overflow: hidden; }
  .card-body-content { padding: 0.85rem 1rem 1rem; border-top: 1px solid var(--border); position: relative; }

  .copy-btn {
    position: absolute; top: 0.85rem; right: 1rem;
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.25rem 0.65rem;
    background: #0f1117; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }
  .copy-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

  pre {
    background: var(--code-bg); border: 1px solid #151b28; border-radius: 8px;
    padding: 1rem 1.1rem; font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; line-height: 1.7; color: #8899bb;
    white-space: pre-wrap; word-break: break-word; overflow: hidden;
  }
  .k { color: #7c6af7; } .s { color: #4ec994; } .n { color: #e8b86d; } .b { color: #f76a6a; }

  .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
  .empty strong { display: block; font-size: 2.5rem; margin-bottom: 0.5rem; }

  footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); }
</style>

let activeFilter = 'all';
const openSet = new Set();

function syntaxHighlight(json) {
  return JSON.stringify(json, null, 2)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\\"])*\"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'n';
      if (/^"/.test(m)) { c = /:$/.test(m) ? 'k' : 's'; }
      else if (/true|false|null/.test(m)) c = 'b';
      return `<span class="${c}">${m}</span>`;
    });
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggle(n) {
  openSet.has(n) ? openSet.delete(n) : openSet.add(n);
  const card = document.getElementById('c' + n);
  if (card) card.classList.toggle('open', openSet.has(n));
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = items.filter(i => {
    const matchF = activeFilter === 'all' || i.tag === activeFilter;
    const matchQ = !q || i.title.toLowerCase().includes(q) || i.tag.includes(q) || JSON.stringify(i.json).toLowerCase().includes(q);
    return matchF && matchQ;
  });

  const info = document.getElementById('results-info');
  info.textContent = (q || activeFilter !== 'all')
    ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`
    : '';

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><strong>∅</strong>no structures found</div>';
    return;
  }

  list.innerHTML = filtered.map(i => {
    const isOpen = openSet.has(i.n);
    return `
    <div class="card${isOpen ? ' open' : ''}" id="c${i.n}">
      <div class="card-header" onclick="toggle(${i.n})">
        <span class="card-num">#${String(i.n).padStart(3,'0')}</span>
        <span class="tag tag-${i.tag}">${i.tag}</span>
        <span class="card-title">${i.title}</span>
        <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="card-body-content">
            <button class="copy-btn" onclick="copyJSON(event,${i.n})" id="cpbtn${i.n}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              copy
            </button>
            <pre>${syntaxHighlight(i.json)}</pre>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function copyJSON(e, n) {
  e.stopPropagation();
  const item = items.find(i => i.n === n);
  if (!item) return;

  const text = JSON.stringify(item.json, null, 2);

  // fallback universal via textarea + execCommand
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(err) {}
  document.body.removeChild(ta);

  // tenta clipboard API por cima se disponível
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {});
  }

  const btn = document.getElementById('cpbtn' + n);
  if (!btn) return;
  btn.classList.add('copied');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg> copied!';
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> copy';
  }, 1800);
}

render();
